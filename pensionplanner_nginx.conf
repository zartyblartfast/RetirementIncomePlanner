server {
    listen 80;
    server_name planner.countdays.co.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name planner.countdays.co.uk;

    # SSL — will be configured with Let's Encrypt / certbot
    ssl_certificate /etc/letsencrypt/live/planner.countdays.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/planner.countdays.co.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /opt/pensionplanner/static/;
        expires 7d;
    }
}
