name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/pensionplanner
            # Preserve user data before pulling
            [ -f config_active.json ] && cp config_active.json /tmp/config_active_backup.json || true
            [ -d scenarios ] && cp -r scenarios /tmp/scenarios_backup || true
            git fetch origin main --tags
            # Try clean ff-only; fall back to hard reset if working tree is dirty (e.g. transition)
            git pull origin main --ff-only || git reset --hard origin/main
            # Restore user data (may have been removed during tracking change or hard reset)
            [ ! -f config_active.json ] && [ -f /tmp/config_active_backup.json ] && cp /tmp/config_active_backup.json config_active.json || true
            [ ! -d scenarios ] && [ -d /tmp/scenarios_backup ] && cp -r /tmp/scenarios_backup scenarios || true
            # Write VERSION file so the app can display version + datetime
            echo "$(git describe --tags --always) $(git log -1 --format=%ci)" > VERSION
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            sudo systemctl restart pensionplanner
